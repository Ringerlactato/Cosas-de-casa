<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Cosas de casa</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="header">
      <div class="brand">
        <h1>COSAS DE CASA</h1>
      </div>
    </header>

    <main class="layout">
      <section class="card">
        <h2>Tareas pendientes</h2>
        <form id="taskForm" class="inline-form">
          <input id="taskInput" type="text" placeholder="Añadir tarea..." required />
          <button type="submit">Añadir</button>
        </form>
        <ul id="taskList" class="check-list"></ul>
      </section>

      <section class="card">
        <h2>Lista de la compra</h2>
        <form id="shoppingForm" class="inline-form">
          <input id="shoppingInput" type="text" placeholder="Añadir producto..." required />
          <button type="submit">Añadir</button>
        </form>
        <ul id="shoppingList" class="check-list"></ul>
      </section>

      <section class="card wide">
        <h2>Frecuencia de limpieza</h2>
        <div id="cleaningList" class="cleaning-list"></div>
      </section>

      <section class="card">
        <h2>Jardin</h2>
        <form id="plantForm" class="stack-form">
          <input id="plantName" type="text" placeholder="Especie o nombre" required />
          <select id="plantWatering" required>
            <option value="">Frecuencia de riego</option>
            <option>Diario</option>
            <option>Cada 2 días</option>
            <option>Semanal</option>
            <option>Quincenal</option>
          </select>
          <input id="plantLight" type="text" placeholder="Exposición a la luz (ej. indirecta)" required />
          <textarea id="plantNotes" rows="3" placeholder="Notas de cuidado"></textarea>
          <button type="submit">Guardar planta</button>
        </form>
        <div id="plantCards" class="plant-cards"></div>
      </section>

      <section class="card wide">
        <div class="calendar-head">
          <h2>Calendario compartido</h2>
          <div class="month-controls">
            <button id="prevMonth" type="button">←</button>
            <span id="monthLabel"></span>
            <button id="nextMonth" type="button">→</button>
          </div>
        </div>

        <div class="calendar-grid" id="calendarGrid"></div>

        <form id="eventForm" class="event-form">
          <h3>Eventos</h3>
          <input id="eventDate" type="date" required />
          <input id="eventTitle" type="text" placeholder="Título del evento" required />
          <select id="eventType" required>
            <option value="comida-familiar">Comida familiar</option>
            <option value="refuerzo">Refuerzo</option>
            <option value="guardia-adrian">Guardia Adrián</option>
            <option value="guardia-jm">Guardia JM</option>
          </select>
          <button type="submit">Guardar evento</button>
        </form>

        <form id="holidayForm" class="event-form holiday-form">
          <h3>Festivos manuales</h3>
          <input id="holidayDate" type="date" required />
          <input id="holidayName" type="text" placeholder="Nombre del festivo" required />
          <button type="submit">Guardar festivo</button>
        </form>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
